name: Bi-Weekly Content Publisher

on:
  schedule:
    - cron: '0 9 * * 4/14'
  workflow_dispatch:

jobs:
  publish-draft:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check for draft articles
        id: check-drafts
        run: |
          if [ -d "_drafts" ] && [ "$(ls -A _drafts/*.html 2>/dev/null)" ]; then
            echo "has_drafts=true" >> $GITHUB_OUTPUT
            DRAFT=$(ls _drafts/*.html | head -1)
            echo "draft_file=$DRAFT" >> $GITHUB_OUTPUT
            echo "draft_name=$(basename $DRAFT)" >> $GITHUB_OUTPUT
          else
            echo "has_drafts=false" >> $GITHUB_OUTPUT
          fi

      - name: Publish draft article
        if: steps.check-drafts.outputs.has_drafts == 'true'
        run: |
          DRAFT="${{ steps.check-drafts.outputs.draft_file }}"
          DRAFT_NAME="${{ steps.check-drafts.outputs.draft_name }}"

          cp "$DRAFT" "$DRAFT_NAME"

          TITLE=$(grep -o '<title>[^<]*</title>' "$DRAFT_NAME" | sed 's/<[^>]*>//g' | sed 's/ — Fine.*$//')
          TODAY=$(date +"%B %d, %Y")
          TODAY_ISO=$(date +"%Y-%m-%d")

          # Update journal.html - update the first card in flg-originals section
          if [ -f "journal.html" ]; then
            python3 - <<PYEOF
import re

with open('journal.html', 'r') as f:
    content = f.read()

draft_name = "$DRAFT_NAME"
title = "$TITLE"
today = "$TODAY"
today_iso = "$TODAY_ISO"

new_card = f"""        <a href="{draft_name}" class="card">
          <div class="card__body">
            <p class="card__meta">{today}</p>
            <h3 class="card__title">{title}</h3>
            <span class="card__cta">Read →</span>
          </div>
        </a>"""

# Replace the first card in the flg-originals section
content = re.sub(
    r'(<section[^>]*id="flg-originals"[^>]*>.*?<div[^>]*class="card-grid"[^>]*>s*)(<a[^>]*class="card"[^>]*>.*?</a>)',
    r'\1' + new_card,
    content, count=1, flags=re.DOTALL
)

with open('journal.html', 'w') as f:
    f.write(content)

print("journal.html updated")
PYEOF
          fi

          # Update archive.html
          if [ -f "archive.html" ]; then
            python3 - <<PYEOF
import re

with open('archive.html', 'r') as f:
    content = f.read()

draft_name = "$DRAFT_NAME"
title = "$TITLE"
today = "$TODAY"
today_iso = "$TODAY_ISO"

new_entry = f"""              <a href="{draft_name}" class="archive-item">
                <time datetime="{today_iso}">{today}</time>
                <span class="archive-title">{title}</span>
                <span class="archive-arrow">→</span>
              </a>
"""

content = re.sub(r'(class="archive-list"[^>]*>s*)', r'\1' + new_entry, content, count=1)

with open('archive.html', 'w') as f:
    f.write(content)

print("archive.html updated")
PYEOF
          fi

          rm "$DRAFT"

      - name: Commit and push changes
        if: steps.check-drafts.outputs.has_drafts == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Bi-weekly publish: ${{ steps.check-drafts.outputs.draft_name }} [$(date +'%Y-%m-%d')]"
          git push

      - name: No drafts notification
        if: steps.check-drafts.outputs.has_drafts == 'false'
        run: |
          echo "::warning::No draft articles found in _drafts/ folder."
          echo "::warning::Add your next article to the _drafts/ folder before the next scheduled run."
