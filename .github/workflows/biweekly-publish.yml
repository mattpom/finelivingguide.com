name: Bi-Weekly Content Publisher

on:
  schedule:
    - cron: '0 9 * * 4/14'
  workflow_dispatch:

jobs:
  publish-draft:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Find and publish draft
        run: |
          if ! ls _drafts/*.html > /dev/null 2>&1; then
            echo "::warning::No drafts found in _drafts/ - add next article before scheduled run"
            exit 0
          fi
          DRAFT=$(ls _drafts/*.html | sort | head -1)
          DRAFT_NAME=$(basename "$DRAFT")
          cp "$DRAFT" "$DRAFT_NAME"
          rm "$DRAFT"
          TITLE=$(grep -oP '(?<=<title>)[^<]+' "$DRAFT_NAME" | sed "s/ — Fine.*//")
          TODAY=$(date +"%B %-d, %Y")
          TODAY_ISO=$(date +"%Y-%m-%d")
          echo "Publishing: $DRAFT_NAME | $TITLE | $TODAY"
          # Update journal.html - inject new card at top of flg-originals grid
          if [ -f journal.html ]; then
            NEW_CARD="          <a href=\"$DRAFT_NAME\" class=\"card\"><div class=\"card__body\"><p class=\"card__meta\">$TODAY<\/p><h3 class=\"card__title\">$TITLE<\/h3><span class=\"card__cta\">Read &rarr;<\/span><\/div><\/a>"
            sed -i "s|id=\"flg-originals\"|id=\"flg-originals\">\n$NEW_CARD\n<!--ORIGINALS|" journal.html
          fi
          # Update archive.html - inject into article-list
          if [ -f archive.html ]; then
            ENTRY="      <a href=\"$DRAFT_NAME\" class=\"article-row\"><div class=\"row-content\"><div class=\"row-cat\">Fine Living<\/div><div class=\"row-title\">$TITLE<\/div><div class=\"row-date\">$TODAY<\/div><\/div><div class=\"row-arrow\">&rarr;<\/div><\/a>"
            sed -i "s|class=\"article-list\"|class=\"article-list\">\n$ENTRY\n<!--ARTICLELIST|" archive.html
          fi
          # Update sitemap.xml - insert new URL before closing tag
          if [ -f sitemap.xml ]; then
            NEW_URL="  <url>\n    <loc>https:\/\/finelivingguide.com\/$DRAFT_NAME<\/loc>\n    <changefreq>monthly<\/changefreq>\n    <priority>0.9<\/priority>\n  <\/url>"
            sed -i "s|<\/urlset>|$NEW_URL\n<\/urlset>|" sitemap.xml
            sed -i "s|finelivingguide.com/index.html|finelivingguide.com/|g" sitemap.xml
          fi
          # Update or create feed.xml RSS feed
          FEED_ENTRY="    <item>\n      <title>$TITLE<\/title>\n      <link>https:\/\/finelivingguide.com\/$DRAFT_NAME<\/link>\n      <pubDate>$(date -R)<\/pubDate>\n      <guid>https:\/\/finelivingguide.com\/$DRAFT_NAME<\/guid>\n    <\/item>"
          if [ -f feed.xml ]; then
            sed -i "s|<\/channel>|$FEED_ENTRY\n  <\/channel>|" feed.xml
          else
            cat > feed.xml << FEEDEOF
<?xml version="1.0" encoding="UTF-8"?>
<rss version="2.0">
  <channel>
    <title>The Fine Living Guide — Journal</title>
    <link>https://finelivingguide.com</link>
    <description>The art of fine living. Curated editorial on dining, spirits, style, and the good life.</description>
    <language>en-us</language>
$FEED_ENTRY
  </channel>
</rss>
FEEDEOF
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Bi-weekly publish: $DRAFT_NAME [$TODAY_ISO]"
          git push
